name: Manual Agent Trigger

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform'
        required: true
        default: 'post_question'
        type: choice
        options:
          - post_question
          - engage_audience
          - generate_report
          - post_thread
      topic:
        description: 'Topic (for post_thread only)'
        required: false
        default: 'Artificial Intelligence'

jobs:
  manual-run:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - run: pip install -r requirements.txt

      - name: Execute action
        env:
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_SECRET: ${{ secrets.TWITTER_ACCESS_SECRET }}
          TWITTER_BEARER_TOKEN: ${{ secrets.TWITTER_BEARER_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
          ACTION: ${{ github.event.inputs.action }}
          TOPIC: ${{ github.event.inputs.topic }}
        run: |
          python -c "
          import asyncio, os
          from src.agent import SocialMediaAgent
          agent = SocialMediaAgent()
          action = os.getenv('ACTION')
          if action == 'post_question':
              asyncio.run(agent.post_daily_question())
          elif action == 'engage_audience':
              asyncio.run(agent.engage_with_audience())
          elif action == 'generate_report':
              asyncio.run(agent.generate_daily_report())
          "
